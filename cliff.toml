# git-cliff configuration — https://git-cliff.org/docs/configuration
# Generates CHANGELOG.md from Conventional Commits. Regenerate with:
#   git cliff -o CHANGELOG.md

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\
"""
body = """

## {% if version %}[{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}[Unreleased]{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}

{% for commit in commits %}- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first | trim }}
{% endfor %}{% endfor %}"""
trim = false
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Map Conventional Commit types to changelog sections.
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^(build|ci|chore)", group = "<!-- 6 -->Build & Tooling" },
  { message = "^revert", group = "<!-- 7 -->Reverts" },
  { message = ".*", group = "<!-- 8 -->Other" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
